<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>凭证列表 · xAI HTTP</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="top">
    <div class="top-main">
      <div>
        <h1>凭证列表</h1>
        <p class="muted">本机 {{ host }}:{{ port }} · 分页查看当前凭证并管理历史导出</p>
      </div>
      <nav class="nav">
        <a href="/" class="{% if active == 'run' %}active{% endif %}">运行台</a>
        <a href="/config" class="{% if active == 'config' %}active{% endif %}">配置中心</a>
        <a href="/credentials" class="{% if active == 'credentials' %}active{% endif %}">凭证列表</a>
      </nav>
    </div>
  </header>

  <main class="grid credentials-page">
    <section class="panel wide">
      <div class="cred-head">
        <div>
          <h2>当前凭证</h2>
          <p class="muted" id="credMeta">正在读取…</p>
        </div>
        <div class="actions" style="margin-top:0">
          <button type="button" id="btnCredRefresh">刷新</button>
          <button type="button" id="btnCredCopy">复制当前页</button>
          <button type="button" id="btnCredExportPage" class="primary">导出当前页</button>
        </div>
      </div>

      <div class="cred-pager" aria-label="凭证分页">
        <button type="button" id="btnCredPrev">上一页</button>
        <button type="button" id="btnCredNext">下一页</button>
        <label class="cred-page-jump">
          第
          <input id="credPageInput" type="number" min="1" value="1" inputmode="numeric" />
          页
        </label>
        <button type="button" id="btnCredGo">跳转</button>
        <label class="cred-page-jump">
          每页
          <select id="credPageSize">
            <option value="100">100</option>
            <option value="500">500</option>
            <option value="1000" selected>1000</option>
          </select>
          条
        </label>
      </div>

      <p class="msg" id="credMsg" role="status" aria-live="polite"></p>
      <textarea
        id="credListText"
        class="credentials-list credentials-list-full"
        readonly
        spellcheck="false"
        aria-label="当前页凭证正文"
        placeholder="当前页暂无凭证"
      ></textarea>
      <p class="muted">导出会先写入并校验历史文件，再清理当前页对应的本地 JSON/SSO 文件。</p>
    </section>

    <section class="panel wide">
      <div class="cred-head">
        <div>
          <h2>历史导出</h2>
          <p class="muted" id="exportMeta">正在读取…</p>
        </div>
        <div class="actions" style="margin-top:0">
          <button type="button" id="btnExportRefresh">刷新历史导出</button>
        </div>
      </div>
      <p class="msg" id="exportMsg" role="status" aria-live="polite"></p>

      <div class="export-table-wrap">
        <table class="export-table">
          <thead>
            <tr>
              <th>文件</th>
              <th>行数</th>
              <th>大小</th>
              <th>时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="exportTableBody">
            <tr><td colspan="5" class="muted">正在读取…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="export-preview">
        <div class="cred-head">
          <div>
            <h3>历史文件预览</h3>
            <p class="muted" id="exportPreviewMeta">选择一个历史文件查看</p>
          </div>
          <div class="actions" style="margin-top:0">
            <button type="button" id="btnExportPreviewCopy" disabled>复制预览</button>
            <a id="btnExportPreviewDownload" href="#" download aria-disabled="true">下载文件</a>
          </div>
        </div>
        <textarea
          id="exportPreviewText"
          class="credentials-list export-preview-text"
          readonly
          spellcheck="false"
          aria-label="历史文件预览正文"
          placeholder="从上方列表选择“预览”"
        ></textarea>
      </div>
    </section>
  </main>

  <script src="/static/credentials.js"></script>
</body>
</html>
